<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calculadora Imagina Ser 65</title>
<style>
  /* Estilos (CSS) para dar una presentación profesional */
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    background-color: #f4f7f6;
    margin: 0;
    padding: 20px;
  }
  
  .contenedor-simulador {
    max-width: 500px;
    margin: 0 auto;
    background-color: #ffffff;
    padding: 30px;
    border-radius: 12px;
    box-shadow: 0 4px 15px rgba(0,0,0,0.05);
  }

  .logo-oficial {
    max-width: 180px;
    display: block;
    margin: 0 auto 20px auto;
  }

  .contenedor-simulador h3 {
    text-align: center;
    color: #1a365d;
    font-size: 22px;
    margin-bottom: 25px;
  }

  .formulario {
    display: flex;
    flex-direction: column;
    gap: 15px;
  }

  .formulario label {
    font-weight: 600;
    color: #4a5568;
    font-size: 14px;
    margin-bottom: -5px;
  }

  .formulario input, .formulario select {
    padding: 12px;
    border: 1px solid #cbd5e0;
    border-radius: 6px;
    font-size: 16px;
    color: #2d3748;
    background-color: #f8fafc;
    transition: border-color 0.3s;
  }

  .formulario input:focus, .formulario select:focus {
    outline: none;
    border-color: #3182ce;
    background-color: #ffffff;
  }

  .formulario button {
    margin-top: 10px;
    padding: 15px;
    background-color: #2b6cb0;
    color: white;
    border: none;
    border-radius: 6px;
    font-size: 16px;
    font-weight: bold;
    cursor: pointer;
    transition: background-color 0.3s;
  }

  .formulario button:hover {
    background-color: #2c5282;
  }

  #resultados {
    margin-top: 30px;
    padding: 20px;
    background-color: #ebf8ff;
    border-left: 5px solid #3182ce;
    border-radius: 6px;
  }

  #resultados p {
    margin: 0 0 10px 0;
    color: #2d3748;
    font-size: 15px;
  }

  #resultados h2 {
    color: #2b6cb0;
    font-size: 20px;
    margin: 15px 0;
  }

  .nota {
    font-size: 13px !important;
    color: #718096 !important;
    font-style: italic;
  }
</style>
</head>
<body>

<div id="simulador-diaz-aceval" class="contenedor-simulador">
  <!-- REEMPLAZA ESTO CON LA URL DE TU LOGO REAL -->
  <img src="URL_DE_TU_LOGO_AQUI.png" alt="Díaz Aceval Asesores" class="logo-oficial">
  
  <h3>Proyecta tu Retiro con Imagina Ser 65</h3>
  
  <div class="formulario">
    <label>Tu Nombre:</label>
    <input type="text" id="nombre" placeholder="Mínimo 3 letras">

    <label>Edad Actual:</label>
    <input type="number" id="edad" min="18" max="55" value="30">
    
    <label>Aportación Mensual Deseada ($):</label>
    <input type="number" id="aportacion" min="2000" value="2000">
    
    <label>Años a Aportar:</label>
    <select id="plazo">
      <option value="10">10 Años</option>
      <option value="15">15 Años</option>
    </select>

    <label>WhatsApp:</label>
    <input type="tel" id="whatsapp" placeholder="10 dígitos">
    
    <button onclick="calcularRetiro()">Generar Mi Cotización</button>
  </div>
  
  <div id="resultados" style="display: none;">
    <p>Aportación Total Estimada: <span id="total-aportado" style="font-weight: bold;"></span></p>
    <h2>TOTAL A RECIBIR GARANTIZADO: <br><span id="total-garantizado"></span></h2>
    <p class="nota">Protección Inicial Vida/Invalidez desde el día 1.</p>
  </div>
</div>

<script>
function calcularRetiro() {
  const edad = parseInt(document.getElementById('edad').value);
  const aportacion = parseFloat(document.getElementById('aportacion').value);
  const plazo = parseInt(document.getElementById('plazo').value);
  
  const inflacion = 0.04; 
  const rendimientoTecnico = 0.04; 
  
  let totalAportado = 0;
  let totalGarantizado = 0;
  
  for(let i = 0; i < plazo; i++) {
    let aportacionAnual = (aportacion * 12) * Math.pow(1 + inflacion, i);
    totalAportado += aportacionAnual;
    
    let añosCrecimiento = (65 - edad) - i;
    totalGarantizado += aportacionAnual * Math.pow(1 + rendimientoTecnico, añosCrecimiento);
  }
  
  document.getElementById('total-aportado').innerText = "$" + totalAportado.toLocaleString('es-MX', {maximumFractionDigits: 0});
  document.getElementById('total-garantizado').innerText = "$" + totalGarantizado.toLocaleString('es-MX', {maximumFractionDigits: 0});
  
  // Efecto de aparición suave
  const resultadosDiv = document.getElementById('resultados');
  resultadosDiv.style.display = 'block';
  resultadosDiv.style.opacity = '0';
  setTimeout(() => {
    resultadosDiv.style.transition = 'opacity 0.5s ease';
    resultadosDiv.style.opacity = '1';
  }, 50);
}
</script>

</body>
</html>
