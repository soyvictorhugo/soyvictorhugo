                SlidePrioridades,
                SlideEmpresa,
                SlideReferidos
            ];

            const nextSlide = () => setCurrentSlide(p => Math.min(p + 1, slides.length - 1));
            const prevSlide = () => setCurrentSlide(p => Math.max(p - 1, 0));

            // Soporte teclado
            useEffect(() => {
                const handleKeyDown = (e) => {
                    if (e.key === 'ArrowRight' || e.key === ' ') nextSlide();
                    if (e.key === 'ArrowLeft') prevSlide();
                };
                window.addEventListener('keydown', handleKeyDown);
                return () => window.removeEventListener('keydown', handleKeyDown);
            }, []);

            const CurrentSlideComponent = slides[currentSlide];

            const toggleFullScreen = () => {
                if (!document.fullscreenElement) document.documentElement.requestFullscreen().catch(e=>console.log(e));
                else if (document.exitFullscreen) document.exitFullscreen();
            };

            return (
                <div className="h-full w-full relative bg-slate-100 flex flex-col justify-center items-center">
                    
                    {/* Barra de Progreso Superior */}
                    <div className="absolute top-0 left-0 w-full h-1.5 bg-slate-200 z-50">
                        <motion.div 
                            className="h-full bg-corporate-cyan"
                            initial={{ width: 0 }}
                            animate={{ width: `${((currentSlide + 1) / slides.length) * 100}%` }}
                            transition={{ duration: 0.5 }}
                        />
                    </div>

                    {/* Contenedor principal estilo app/presentación */}
                    <div className="relative w-full max-w-7xl mx-auto h-full sm:h-[calc(100vh-2rem)] sm:my-4 sm:rounded-3xl shadow-2xl overflow-hidden bg-white">
                        <AnimatePresence mode="wait">
                            <CurrentSlideComponent key={currentSlide} onNext={nextSlide} onPrev={prevSlide} />
                        </AnimatePresence>
                    </div>

                    {/* Navegación Flotante */}
                    <div className="absolute bottom-6 right-6 flex gap-3 z-50">
                        <button 
                            onClick={prevSlide} 
                            disabled={currentSlide === 0}
                            className="w-14 h-14 rounded-full bg-white shadow-xl text-corporate-navy hover:bg-corporate-light hover:scale-110 transition-all flex items-center justify-center disabled:opacity-30 disabled:hover:scale-100 disabled:cursor-not-allowed border border-slate-100"
                        >
                            <i className="fa-solid fa-chevron-left text-xl"></i>
                        </button>
                        <button 
                            onClick={nextSlide} 
                            disabled={currentSlide === slides.length - 1}
                            className="w-14 h-14 rounded-full bg-corporate-navy shadow-xl text-white hover:bg-corporate-cyan hover:scale-110 transition-all flex items-center justify-center disabled:opacity-30 disabled:hover:scale-100 disabled:cursor-not-allowed border border-corporate-navy"
                        >
                            <i className="fa-solid fa-chevron-right text-xl"></i>
                        </button>
                    </div>

                    {/* Fullscreen toggle */}
                    <button 
                        onClick={toggleFullScreen} 
                        className="absolute top-6 right-6 w-12 h-12 rounded-full bg-white/50 backdrop-blur-md shadow-md text-corporate-navy hover:bg-white hover:scale-110 transition-all flex items-center justify-center z-50"
                    >
                        <i className="fa-solid fa-expand text-lg"></i>
                    </button>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
